<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>e-Gov 改正頻度ヒートマップ — 法令種別</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#2e5090" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="法令ヒートマップ" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-180.png" />
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  :root {
    --ink: #32414b;          /* base text (finoject Deep Slate Gray) */
    --accent: #2e5090;       /* finoject YInMn Blue */
    --line: #d9dee3;
    --panel: #f6f8fa;
    --muted: #6b7884;
    --zero: #eceff1;         /* 改正0回 = 無彩色 */
    --bg: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, sans-serif;
    color: var(--ink); background: var(--bg); font-size: 15px;
    display: flex; flex-direction: column; height: 100vh;
  }
  header { border-bottom: 1px solid var(--line); padding: 9px 16px; }
  .hrow { display: flex; flex-wrap: wrap; gap: 10px 18px; align-items: center; }
  .hrow.r1 { margin-bottom: 8px; }
  header h1 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: .02em; }
  header h1 .sub { color: var(--muted); font-weight: 400; font-size: 12.5px; margin-left: 8px; }
  #guide { color: var(--muted); font-size: 12.5px; line-height: 1.4; flex: 1 1 280px; }
  #guide b { color: var(--ink); font-weight: 600; }
  .ctl { display: flex; align-items: center; gap: 6px; }
  .ctl label { color: var(--muted); font-size: 12.5px; }
  select, input[type=search] {
    font: inherit; font-size: 13.5px; color: var(--ink);
    border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; background: #fff;
  }
  select:disabled { color: var(--muted); background: #f3f5f7; }
  input[type=search] { width: 260px; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .seg.primary { box-shadow: 0 0 0 2px rgba(46,80,144,.10); }
  .seg button {
    font: inherit; font-size: 13.5px; border: 0; background: #fff; color: var(--ink);
    padding: 6px 14px; cursor: pointer;
  }
  .seg button.active { background: var(--accent); color: #fff; }
  .seg button + button { border-left: 1px solid var(--line); }
  .presets { display: inline-flex; gap: 4px; }
  .presets button {
    font: inherit; font-size: 12px; border: 1px solid var(--line); background: #fff; color: var(--muted);
    padding: 3px 8px; border-radius: 5px; cursor: pointer;
  }
  .presets button:hover { border-color: var(--accent); color: var(--accent); }
  .presets button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .summary { background: #eef2f8; border: 1px solid #dde5f0; border-radius: 8px; padding: 9px 11px; margin: 2px 0 10px; font-size: 12.5px; line-height: 1.5; }
  .summary .st { color: var(--accent); font-weight: 700; font-size: 11.5px; display: block; margin-bottom: 3px; }
  .summary b { font-weight: 600; }
  .insight { background: #fbf7ee; border: 1px solid #ecdfc4; border-radius: 8px; padding: 9px 11px; margin: 2px 0 10px; font-size: 12.5px; line-height: 1.55; }
  .insight .it { color: #9a6b1f; font-weight: 700; font-size: 11px; display: block; margin-bottom: 3px; }
  .insight .note { color: var(--muted); font-size: 10.5px; margin-top: 4px; }

  main { flex: 1; display: flex; min-height: 0; }
  #stage { flex: 1; overflow: hidden; padding: 16px; position: relative; min-width: 0; }
  #chart { display: block; }
  #legend { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin: 4px 0 14px; }
  #legend .item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  #legend .sw { width: 18px; height: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,.08); }
  #legend .title { color: var(--ink); font-weight: 600; }

  aside {
    width: 360px; border-left: 1px solid var(--line); background: var(--panel);
    overflow: auto; padding: 0; display: none; flex-direction: column;
  }
  aside.open { display: flex; }
  aside .head { padding: 12px 16px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--panel); }
  aside .head .t { font-weight: 600; font-size: 14px; }
  aside .head .s { color: var(--muted); font-size: 12px; margin-top: 2px; }
  aside .close { float: right; cursor: pointer; color: var(--muted); border: 0; background: none; font-size: 18px; line-height: 1; }
  aside section { padding: 10px 16px 16px; }
  aside h3 { font-size: 12px; text-transform: none; color: var(--accent); margin: 6px 0 8px; letter-spacing: .03em; }
  .law { padding: 7px 0; border-bottom: 1px solid #e7ebef; display: flex; gap: 8px; align-items: baseline; }
  .law:last-child { border-bottom: 0; }
  .law .cnt { flex: 0 0 auto; min-width: 30px; text-align: right; font-variant-numeric: tabular-nums;
    color: var(--accent); font-weight: 600; }
  .law .nm { flex: 1; line-height: 1.35; }
  .law .nm a { color: var(--ink); text-decoration: none; }
  .law .nm a:hover { text-decoration: underline; color: var(--accent); }
  .law .meta { color: var(--muted); font-size: 11px; }
  .law .plain { color: #6b5a2f; font-size: 11px; margin-top: 1px; }
  .law .plain::before { content: "≒ "; color: #b09a5e; }
  .more { color: var(--muted); font-size: 12px; padding-top: 8px; }

  text.rowlab { font-size: 12px; fill: var(--ink); }
  text.yearlab { font-size: 10px; fill: var(--muted); }
  text.yearlab.major { fill: var(--ink); font-weight: 600; }
  text.rowlab.cur { fill: var(--accent); font-weight: 700; }
  line.gridsep { stroke: var(--line); stroke-width: 1px; shape-rendering: crispEdges; }
  rect.cell { stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
  rect.cell.dim { opacity: .15; }
  rect.cell.hit { stroke: var(--accent); stroke-width: 2.5px; }
  rect.cell.sel { stroke: var(--ink); stroke-width: 3px; }
  .tile text { pointer-events: none; }
  .tile rect { cursor: pointer; stroke: #fff; stroke-width: 1.5px; }
  .tile.dim { opacity: .18; }
  .tile.hit rect { stroke: var(--accent); stroke-width: 2.5px; }
  .tile.sel rect { stroke: var(--ink); stroke-width: 3px; }
  line.pyr-mid { stroke: var(--line); stroke-width: 1px; shape-rendering: crispEdges; }
  rect.pyr-seg { stroke: #fff; stroke-width: .5px; cursor: pointer; }
  rect.pyr-seg:hover { opacity: .82; }
  text.pyr-lab { fill: var(--ink); }
  text.pyr-era { fill: var(--accent); font-weight: 700; }
  text.pyr-total { font-size: 10px; fill: var(--muted); }
  #legend .lt .sw { width: 12px; height: 12px; }

  #tooltip {
    position: fixed; pointer-events: none; background: #1f2933; color: #fff; padding: 7px 10px;
    border-radius: 6px; font-size: 12px; line-height: 1.5; opacity: 0; transition: opacity .08s; z-index: 50;
    max-width: 280px; box-shadow: 0 4px 14px rgba(0,0,0,.25);
  }
  #tooltip b { font-weight: 600; }

  #overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px; color: var(--muted); background: rgba(255,255,255,.85);
  }
  #overlay.hidden { display: none; }
  .spinner { width: 26px; height: 26px; border: 3px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { border-top: 1px solid var(--line); padding: 8px 16px; font-size: 11px; color: var(--muted); }
  footer a { color: var(--muted); }

  /* ---------- モバイル最適化 ---------- */
  @media (max-width: 760px) {
    body { font-size: 14px; }
    header { padding: 8px 10px; }
    .hrow { gap: 6px 10px; }
    .hrow.r1 { margin-bottom: 6px; }
    header h1 { font-size: 14px; flex-basis: 100%; }
    header h1 .sub { display: block; margin-left: 0; margin-top: 1px; font-size: 11px; }
    .seg.primary { flex: 1 1 auto; }
    .seg.primary button { flex: 1; padding: 7px 6px; font-size: 12px; }
    #guide { order: 9; flex-basis: 100%; font-size: 11.5px; }
    .hrow.r2 { row-gap: 6px; }
    .hrow.r2 .ctl:nth-child(3) { flex-basis: 100%; }   /* 検索を独立行に */
    input[type=search] { width: 100%; }
    .presets button { padding: 4px 7px; }

    /* 右パネルを下部ドロワー化（スライドアップ） */
    aside {
      position: fixed; left: 0; right: 0; bottom: 0; top: auto; width: auto;
      height: 68vh; max-height: 68vh; border-left: 0; border-top: 1px solid var(--line);
      border-radius: 14px 14px 0 0; box-shadow: 0 -8px 28px rgba(0,0,0,.22);
      transform: translateY(100%); transition: transform .24s ease;
      display: flex; z-index: 60; padding-bottom: env(safe-area-inset-bottom);
    }
    aside.open { transform: translateY(0); }
    aside .head { border-radius: 14px 14px 0 0; padding-top: 16px; }
    aside .head::before {
      content: ""; position: absolute; top: 7px; left: 50%; transform: translateX(-50%);
      width: 40px; height: 4px; border-radius: 2px; background: var(--line);
    }
    aside .close { font-size: 26px; padding: 0 4px; }
    #stage { padding: 8px; }
    #legend { gap: 8px 10px; margin-bottom: 8px; }
    #legend .item { font-size: 11px; }
    #tooltip { display: none; }   /* タッチでは内訳はパネルで見せる */
  }
</style>
</head>
<body>
<header>
  <div class="hrow r1">
    <h1>e-Gov 改正頻度ヒートマップ<span class="sub">現行法令の改正が、どの分野・時代に集中しているかを可視化</span></h1>
    <div class="seg primary" id="modeSeg">
      <button data-mode="grid" class="active" title="行=分野 × 列=5年区切りの年代。色＝その5年間の改正回数。時系列の偏りを把握。">経年グリッド</button>
      <button data-mode="treemap" title="タイル面積＝法令数、色＝期間内の改正回数。全体構造を把握。">累計ツリーマップ</button>
      <button data-mode="dist" title="現行法令を公布年（5年区切り）で度数分布。いつ作られた法令が今も生きているかを把握。">公布年別度数分布</button>
    </div>
    <div id="guide"></div>
  </div>
  <div class="hrow r2">
    <div class="ctl">
      <label>分野軸</label>
      <select id="axisSel" title="ヒートマップ/ツリーマップの行・分類を切替"><option value="law_type">法令種別</option></select>
    </div>
    <div class="ctl">
      <label>年</label>
      <span class="presets" id="presets"></span>
      <select id="yearFrom"></select><span style="color:var(--muted)">–</span><select id="yearTo"></select>
    </div>
    <div class="ctl" style="margin-left:auto">
      <input type="search" id="search" placeholder="法令名で検索（部分一致）" autocomplete="off" />
    </div>
  </div>
</header>

<main>
  <div id="stage">
    <div id="legend"></div>
    <svg id="chart"></svg>
    <div id="overlay"><div class="spinner"></div><div id="ovmsg">データ読み込み中…</div></div>
  </div>
  <aside id="panel">
    <div class="head">
      <button class="close" id="panelClose" title="閉じる">×</button>
      <div class="t" id="panelTitle"></div>
      <div class="s" id="panelSub"></div>
    </div>
    <div id="panelBody"></div>
  </aside>
</main>

<footer>
  出典: <span id="srcText">e-Gov 法令API v2</span>（デジタル庁）を加工して作成。政府標準利用規約（第2.0版）に基づく。
  <span id="genInfo"></span> ／ 本ビューアは事前生成した集計JSONを表示します（実行時にAPIへはアクセスしません）。
</footer>

<div id="tooltip"></div>

<script>
const EGOV_LAW_URL = (id) => `https://laws.e-gov.go.jp/law/${id}`;
// 寒色→暖色のヒートマップ分位ランプ (少=青, 多=赤)。0回は別扱い(無彩色)。
// RdYlBu系を低→高で青→赤に。淡い黄白の中間は避け、寒暖の対比を明確にする。
const RAMP = ["#4575b4", "#74add1", "#abd9e9", "#fdae61", "#f46d43", "#d73027"];

const state = {
  data: null, axis: "law_type", mode: "grid", yearFrom: null, yearTo: null, search: "", selected: null,
  insights: null, insightsMeta: null, plainnames: null,
};
const AXIS_LABELS = { law_type: "法令種別", category: "事項別分類", ministry: "所管府省" };
// 公布年別度数分布用: 法令種別ごとのカテゴリ色 (initControlsで法令種別グループ順に割当)
const TYPE_PALETTE = ["#2e5090", "#3a8fb7", "#5aa897", "#c9a24b", "#b0653f", "#7a3b8f", "#8c6aa8", "#b08968", "#9aa7b1"];
const typeColor = {};
const el = (id) => document.getElementById(id);
const tip = el("tooltip");

function showOverlay(msg, spin = true) {
  el("ovmsg").textContent = msg;
  el("overlay").querySelector(".spinner").style.display = spin ? "" : "none";
  el("overlay").classList.remove("hidden");
}
function hideOverlay() { el("overlay").classList.add("hidden"); }

async function load() {
  try {
    showOverlay("データ読み込み中…");
    const res = await fetch("../data/heatmap.json", { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.axes || Object.keys(data.axes).length === 0) {
      showOverlay("表示できるデータがありません（該当0件）。", false);
      return;
    }
    state.data = data;
    state.axis = data.default_axis && data.axes[data.default_axis] ? data.default_axis : Object.keys(data.axes)[0];
    // AI参考解説（任意・事前生成）。無ければ静かにスキップ。
    try {
      const ir = await fetch(`../data/insights.json?t=${state.data.generated_at || Date.now()}`, { cache: "no-store" });
      if (ir.ok) { const ij = await ir.json(); state.insights = ij.items || {}; state.insightsMeta = ij; }
    } catch (_) { /* insights は任意 */ }
    // 古い法令名の平易化（③・任意）
    try {
      const pr = await fetch(`../data/plainnames.json?t=${state.data.generated_at || Date.now()}`, { cache: "no-store" });
      if (pr.ok) { const pj = await pr.json(); state.plainnames = pj.items || {}; }
    } catch (_) { /* plainnames は任意 */ }
    initControls();
    hideOverlay();
    render();
    autoSelectInitial(); // 初回は代表セルを選択して右パネルを開き、価値を即提示
  } catch (e) {
    showOverlay(`データの読み込みに失敗しました: ${e.message}`, false);
    console.error(e);
  }
}

function initControls() {
  buildPeriods();
  // 既定は全期間（1872年〜）。5年区切りで明治から現在までの通史を一望する。
  state.yearFrom = PERIODS[0].start;
  state.yearTo = PERIODS[PERIODS.length - 1].start;
  for (const sel of [el("yearFrom"), el("yearTo")]) {
    sel.innerHTML = PERIODS.map((p) => `<option value="${p.start}">${p.start}〜${p.end}</option>`).join("");
  }
  el("yearFrom").value = state.yearFrom;
  el("yearTo").value = state.yearTo;
  el("genInfo").textContent = `生成日: ${state.data.generated_at}`;
  el("srcText").textContent = state.data.source || "e-Gov 法令API v2";

  // 分野軸セレクタ (data.axes から動的に。第2弾で category 追加、将来 ministry)
  el("axisSel").innerHTML = Object.keys(state.data.axes)
    .map((k) => `<option value="${k}">${state.data.axes[k].label || AXIS_LABELS[k] || k}</option>`).join("");
  el("axisSel").value = state.axis;
  // 法令種別の色割当 (グループ順=法令数の多い順)
  state.data.axes.law_type.groups.forEach((g, i) => { typeColor[g.label] = TYPE_PALETTE[i % TYPE_PALETTE.length]; });
  el("axisSel").addEventListener("change", (e) => {
    state.axis = e.target.value;
    state.selected = null; state.search = ""; el("search").value = "";
    closePanel(); render();
  });

  el("modeSeg").addEventListener("click", (e) => {
    const b = e.target.closest("button"); if (!b) return;
    state.mode = b.dataset.mode;
    [...el("modeSeg").children].forEach((c) => c.classList.toggle("active", c === b));
    state.selected = null; closePanel(); render();
  });
  const onYear = () => {
    let f = +el("yearFrom").value, t = +el("yearTo").value;
    if (f > t) { [f, t] = [t, f]; el("yearFrom").value = f; el("yearTo").value = t; }
    state.yearFrom = f; state.yearTo = t; render();
  };
  el("yearFrom").addEventListener("change", onYear);
  el("yearTo").addEventListener("change", onYear);

  // 年レンジ プリセット（5年区切りの開始年に一致させる）
  const lastStart = PERIODS[PERIODS.length - 1].start;
  const END = PERIODS[PERIODS.length - 1].end;
  const presetDefs = [
    ["全期間", PERIODS[0].start],
    ["直近10年", PERIODS[periodIndexOf(END - 9)].start],
    ["直近30年", PERIODS[periodIndexOf(END - 29)].start],
    ["戦後〜", PERIODS[periodIndexOf(1947)].start],
  ];
  el("presets").innerHTML = presetDefs.map(([lab, f]) => `<button data-from="${f}" data-to="${lastStart}">${lab}</button>`).join("");
  el("presets").addEventListener("click", (e) => {
    const b = e.target.closest("button"); if (!b) return;
    state.yearFrom = +b.dataset.from; state.yearTo = +b.dataset.to;
    el("yearFrom").value = state.yearFrom; el("yearTo").value = state.yearTo;
    render();
  });

  el("search").addEventListener("input", (e) => {
    state.search = e.target.value.trim();
    if (state.search) state.selected = null; else el("panel").classList.remove("open");
    render();
  });
  el("panelClose").addEventListener("click", closePanel);
}

// 5年区切りの期間モデル（1872年起点）。古い→新しいを左→右に並べる。
let PERIODS = [];
const PERIOD_SIZE = 5;
const eraOfYear = (y) => (y >= 2019 ? "令和" : y >= 1989 ? "平成" : y >= 1926 ? "昭和" : y >= 1912 ? "大正" : "明治");
function buildPeriods() {
  const ys = state.data.years;
  PERIODS = [];
  for (let i = 0; i < ys.length; i += PERIOD_SIZE) {
    const chunk = ys.slice(i, i + PERIOD_SIZE);
    PERIODS.push({ start: chunk[0], end: chunk[chunk.length - 1], years: chunk, era: eraOfYear(chunk[0]) });
  }
  PERIODS.forEach((p, i) => { p.eraStart = i === 0 || PERIODS[i - 1].era !== p.era; });
}
const periodsInRange = () => PERIODS.filter((p) => p.start >= state.yearFrom && p.start <= state.yearTo);
const periodVal = (byYear, p) => p.years.reduce((s, y) => s + (byYear[y] || byYear[String(y)] || 0), 0);
const sumInRange = (byYear) => periodsInRange().reduce((s, p) => s + periodVal(byYear, p), 0);
const rangeLabel = () => { const r = periodsInRange(); return r.length ? `${r[0].start}–${r[r.length - 1].end}` : ""; };

// 描画に使える領域 (ウィンドウ - パディング - 凡例)。グリッド/ツリーマップを縦横フィットさせる。
function chartArea() {
  const stage = el("stage");
  const cs = getComputedStyle(stage);
  const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
  const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
  const lg = el("legend");
  const lcs = getComputedStyle(lg);
  const legendH = (lg.offsetHeight || 0) + parseFloat(lcs.marginTop) + parseFloat(lcs.marginBottom);
  return {
    w: Math.max(320, stage.clientWidth - padX),
    h: Math.max(220, stage.clientHeight - padY - legendH - 6),
  };
}
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// 現在の軸の集計セル群
const groupsOf = () => state.data.axes[state.axis].groups;
// 指定区分に属する法令 (現在の軸で)
const lawsInGroup = (group) => state.data.laws.filter((l) => l.groups[state.axis] === group);

// 検索: タイトルに一致する法令と、それが属する現軸の区分集合を返す
function searchMatches() {
  const q = state.search.toLowerCase();
  if (!q) return null;
  const groups = new Set(); const laws = [];
  for (const law of state.data.laws) {
    if ((law.title || "").toLowerCase().includes(q)) {
      const g = law.groups[state.axis];
      if (g != null) groups.add(g);
      laws.push({ ...law, group: g, groupLabel: g });
    }
  }
  return { groups, laws };
}

// 現ビューの値から分位カラースケールを構築
function buildScale(values) {
  const nonzero = values.filter((v) => v > 0);
  if (nonzero.length === 0) return { color: () => "var(--zero)", quantile: null };
  const q = d3.scaleQuantile().domain(nonzero).range(RAMP);
  return { color: (v) => (v > 0 ? q(v) : "var(--zero)"), quantile: q };
}

function renderLegend(scale) {
  const box = el("legend");
  const metric = state.mode === "grid" ? "その5年間の改正回数" : "期間内の改正回数（累計）";
  let html = `<span class="title">凡例</span><span style="color:var(--muted);font-size:12px">${metric}</span>`;
  html += `<span class="item"><span class="sw" style="background:var(--zero)"></span>0回</span>`;
  if (scale.quantile) {
    const ext = scale.quantile.quantiles(); // 境界値 (RAMP.length-1 個)
    RAMP.forEach((col, i) => {
      const lo = i === 0 ? 1 : Math.floor(ext[i - 1]) + 1; // 整数で連続させ重複を防ぐ
      const hi = i === RAMP.length - 1 ? null : Math.floor(ext[i]);
      const lbl = hi == null ? `${lo}〜` : (lo >= hi ? `${lo}` : `${lo}〜${hi}`);
      html += `<span class="item"><span class="sw" style="background:${col}"></span>${lbl}</span>`;
    });
  } else {
    html += `<span class="item" style="color:var(--muted)">この範囲に改正データがありません</span>`;
  }
  box.innerHTML = html;
}

function render() {
  if (!state.data) return;
  const svg = d3.select("#chart");
  svg.selectAll("*").remove();
  const dist = state.mode === "dist";
  // 公布年別度数分布は法令種別固定（軸セレクタは無効）。年レンジは3モード共通で有効。
  el("axisSel").disabled = dist;
  el("yearFrom").disabled = false;
  el("yearTo").disabled = false;
  if (state.mode === "grid") renderGrid(svg);
  else if (state.mode === "treemap") renderTreemap(svg);
  else renderDist(svg);
  if (state.search && !state.selected && !dist) showSearchResults();
  updateGuide();
  syncPresets();
}

// モードごとの読み方ガイド（ヘッダー下）
function updateGuide() {
  const g = {
    grid: "色が濃い（赤）ほど、その<b>5年間の改正回数</b>が多い分野（比率でなく実回数）。<b>セルをクリック</b>で右側に対象法令の一覧・改正ランキング。",
    treemap: "タイルの<b>面積＝法令数</b>・<b>色＝期間内の改正回数</b>。タイルをクリックで内訳。",
    dist: "現行法令を<b>公布年（5年区切り）</b>で度数分布。下＝希少な種別／上＝多数。<b>棒をクリック</b>でその期間の法令一覧。",
  }[state.mode] || "";
  el("guide").innerHTML = g;
}

// プリセットの選択状態を現在の年レンジに同期
function syncPresets() {
  const last = PERIODS[PERIODS.length - 1].start;
  [...el("presets").children].forEach((b) => {
    b.classList.toggle("on", +b.dataset.from === state.yearFrom && +b.dataset.to === state.yearTo && state.yearTo === last);
  });
}

// 初回のみ：表示範囲で最も改正が集中したセルを選び、右パネルを開く
function autoSelectInitial() {
  if (!state.data || state.mode !== "grid" || state.search) return;
  if (window.innerWidth <= 760) return; // モバイルは本体を隠さないよう自動オープンしない
  const periods = periodsInRange();
  let best = null, bestV = 0;
  for (const c of groupsOf()) for (const p of periods) {
    const v = periodVal(c.by_year, p);
    if (v > bestV) { bestV = v; best = { c, p }; }
  }
  if (best && bestV > 0) selectCell(best.c, best.p);
}

// 検索: 一致法令を右パネルに直接表示
function showSearchResults() {
  const m = searchMatches();
  if (!m) return;
  el("panel").classList.add("open");
  el("panelTitle").textContent = `検索: 「${state.search}」`;
  el("panelSub").textContent = `${m.laws.length.toLocaleString()} 件ヒット（${m.groups.size} 区分）`;
  const LIMIT = 80;
  const sorted = m.laws.slice().sort((a, b) => b.total - a.total);
  let html = `<section><h3>該当する法令</h3>`;
  if (sorted.length === 0) html += `<div class="more">一致する法令がありません。</div>`;
  else {
    html += sorted.slice(0, LIMIT).map((law) =>
      `<div class="law"><div class="cnt">${law.total}</div>
       <div class="nm"><a href="${EGOV_LAW_URL(law.id)}" target="_blank" rel="noopener">${escapeHtml(law.title)}</a>
       ${plainSub(law.id)}<div class="meta">${escapeHtml(law.groupLabel || "")} ／ ${escapeHtml(law.num || law.id)}</div></div></div>`).join("");
    if (sorted.length > LIMIT) html += `<div class="more">ほか ${sorted.length - LIMIT} 件</div>`;
  }
  html += `</section>`;
  el("panelBody").innerHTML = html;
}

/* ---------- 経年グリッド（5年区切り・1872〜） ---------- */
function renderGrid(svg) {
  const cells = groupsOf();
  const periods = periodsInRange();
  const match = searchMatches();

  // スケール: 全セル×全期間(範囲内)の値
  const vals = [];
  cells.forEach((c) => periods.forEach((p) => vals.push(periodVal(c.by_year, p))));
  const scale = buildScale(vals);
  renderLegend(scale);

  // ウィンドウ縦横にフィット。上部に元号バンド＋回転した期間ラベル。
  const padTop = 48;
  const area = chartArea();
  const labelW = clamp(area.w * 0.14, 64, 110);
  const colW = (area.w - labelW) / periods.length;
  const rowH = (area.h - padTop) / cells.length;
  const w = area.w, h = area.h;
  const labFont = clamp(rowH * 0.5, 9, 13);
  const gap = colW > 14 && rowH > 16 ? 1 : 0;
  svg.attr("width", w).attr("height", h);
  const gridBottom = padTop + cells.length * rowH;

  // 元号の境目＋表示先頭に区切り線＋元号名（明治／大正／昭和／平成／令和）
  periods.forEach((p, i) => {
    if (!p.eraStart && i !== 0) return;
    const x = labelW + i * colW;
    svg.append("line").attr("class", "gridsep")
      .attr("x1", x).attr("x2", x).attr("y1", 16).attr("y2", gridBottom);
    svg.append("text").attr("class", "pyr-era").attr("x", x + 4).attr("y", 13)
      .style("font-size", "11px").text(p.era);
  });

  // 期間ラベル（5年区切りの開始年）を回転表示。狭いときは間引く。
  const labStep = colW < 22 ? 2 : 1;
  svg.selectAll("text.yearlab").data(periods).enter().append("text")
    .attr("class", (d) => "yearlab" + (d.eraStart ? " major" : ""))
    .attr("transform", (d, i) => `translate(${labelW + i * colW + colW / 2 + 4},${padTop - 6}) rotate(-55)`)
    .attr("text-anchor", "start")
    .text((d, i) => (labStep === 1 || d.eraStart || i % labStep === 0 ? d.start : ""));

  const rows = svg.selectAll("g.row").data(cells).enter().append("g")
    .attr("class", "row")
    .attr("transform", (d, i) => `translate(0,${padTop + i * rowH})`);

  rows.append("text").attr("class", "rowlab")
    .attr("data-group", (d) => d.group)
    .attr("x", labelW - 8).attr("y", rowH / 2 + labFont / 2 - 1).attr("text-anchor", "end")
    .style("font-size", labFont + "px")
    .text((d) => d.label);

  const isSel = (c, p) => state.selected && state.selected.group === c.group && state.selected.period === p.start;
  rows.each(function (c) {
    const g = d3.select(this);
    const dimRow = match && !match.groups.has(c.group);
    g.selectAll("rect").data(periods).enter().append("rect")
      .attr("class", (p) => "cell" + (dimRow ? " dim" : "")
        + (match && match.groups.has(c.group) ? " hit" : "") + (isSel(c, p) ? " sel" : ""))
      .attr("x", (p, i) => labelW + i * colW).attr("y", gap)
      .attr("width", colW).attr("height", Math.max(1, rowH - gap * 2))
      .style("stroke-width", gap ? "1.5px" : "0.5px")
      .attr("fill", (p) => scale.color(periodVal(c.by_year, p)))
      .on("mousemove", (ev, p) => {
        svg.selectAll("text.rowlab").classed("cur", (d) => d.group === c.group);
        showTip(ev, `<b>${c.label}</b> ／ ${p.start}〜${p.end}年（${p.era}）<br>改正 <b>${periodVal(c.by_year, p)}</b> 回<br>法令数 ${c.law_count.toLocaleString()}`);
      })
      .on("mouseleave", () => { svg.selectAll("text.rowlab").classed("cur", false); hideTip(); })
      .on("click", (ev, p) => selectCell(c, p));
  });
}

/* ---------- 累計ツリーマップ ---------- */
function renderTreemap(svg) {
  const cells = groupsOf();
  const match = searchMatches();
  const totals = cells.map((c) => sumInRange(c.by_year));
  const scale = buildScale(totals);
  renderLegend(scale);

  const area = chartArea();
  const w = area.w, h = area.h;
  svg.attr("width", w).attr("height", h);

  const root = d3.hierarchy({ children: cells })
    .sum((d) => d.law_count || 0)
    .sort((a, b) => b.value - a.value);
  d3.treemap().size([w, h]).paddingInner(2).round(true)(root);

  const t = svg.selectAll("g.tile").data(root.leaves()).enter().append("g")
    .attr("class", (d) => {
      const m = match && match.groups.has(d.data.group);
      const dim = match && !m;
      const sel = state.selected && state.selected.group === d.data.group && state.selected.period == null;
      return "tile" + (dim ? " dim" : "") + (m ? " hit" : "") + (sel ? " sel" : "");
    })
    .attr("transform", (d) => `translate(${d.x0},${d.y0})`);

  t.append("rect")
    .attr("width", (d) => d.x1 - d.x0).attr("height", (d) => d.y1 - d.y0)
    .attr("fill", (d) => scale.color(sumInRange(d.data.by_year)))
    .on("mousemove", (ev, d) => showTip(ev,
      `<b>${d.data.label}</b><br>法令数 <b>${d.data.law_count.toLocaleString()}</b><br>改正 <b>${sumInRange(d.data.by_year)}</b> 回（${rangeLabel()}）`))
    .on("mouseleave", hideTip)
    .on("click", (ev, d) => selectCell(d.data, null));

  t.append("text").attr("x", 6).attr("y", 16)
    .style("font-size", "12px").style("font-weight", "600")
    .style("fill", (d) => (sumInRange(d.data.by_year) > (scale.quantile ? (scale.quantile.quantiles()[3] ?? 1e9) : 1e9) ? "#fff" : "var(--ink)"))
    .each(function (d) {
      const wpx = d.x1 - d.x0, hpx = d.y1 - d.y0;
      const sel = d3.select(this);
      if (wpx < 46 || hpx < 26) { sel.remove(); return; }
      sel.append("tspan").text(d.data.label);
      if (hpx > 40)
        sel.append("tspan").attr("x", 6).attr("dy", 15).style("font-weight", "400")
          .style("fill", "currentColor").style("opacity", .85)
          .text(`${d.data.law_count.toLocaleString()}件`);
      if (hpx > 58)
        sel.append("tspan").attr("x", 6).attr("dy", 14).style("font-weight", "400")
          .style("fill", "currentColor").style("opacity", .7)
          .text(`改正${sumInRange(d.data.by_year).toLocaleString()}回`);
    });
}

/* ---------- 公布年別度数分布（現行法令を公布年5年区切りで種別積み上げ） ---------- */
// 公布年→期間インデックス（PERIODS と同じ5年区切り・1872起点）
const periodIndexOf = (year) => {
  if (year == null) return -1;
  const i = Math.floor((year - PERIODS[0].start) / PERIOD_SIZE);
  return i < 0 ? 0 : i >= PERIODS.length ? PERIODS.length - 1 : i;
};

// 期間×種別の公布数を一度だけ集計（全期間ぶん）
function promulgationCounts() {
  const map = PERIODS.map(() => ({}));
  for (const l of state.data.laws) {
    const y = l.date ? parseInt(String(l.date).slice(0, 4), 10) : null;
    if (!Number.isFinite(y)) continue;
    const o = map[periodIndexOf(y)];
    const t = l.groups.law_type || "不明";
    o[t] = (o[t] || 0) + 1;
  }
  return map; // index は PERIODS と対応
}

function renderDist(svg) {
  const periods = periodsInRange();
  // 下＝希少（法令数少）／上＝多数（政令・府省令）。積み上げは下から希少順。
  const stackOrder = state.data.axes.law_type.groups.map((g) => g.label).reverse(); // 少→多
  const counts = promulgationCounts();
  const idxOf = (p) => PERIODS.indexOf(p);

  // 表示範囲の最大列合計＋凡例用の種別合計
  let maxColTotal = 1; const typeTotals = {}; let grand = 0;
  for (const p of periods) {
    const o = counts[idxOf(p)];
    let colTotal = 0;
    for (const t of stackOrder) { const n = o[t] || 0; if (n) { colTotal += n; typeTotals[t] = (typeTotals[t] || 0) + n; grand += n; } }
    if (colTotal > maxColTotal) maxColTotal = colTotal;
  }
  renderDistLegend(typeTotals, grand);

  const area = chartArea();
  const w = area.w, h = area.h;
  const topPad = 18, bottomAxis = 46, leftAxis = 52;
  const plotTop = topPad, plotBottom = h - bottomAxis, plotH = plotBottom - plotTop;
  const colW = (w - leftAxis) / periods.length;
  svg.attr("width", w).attr("height", h);
  const xOf = (i) => leftAxis + i * colW;
  const y = d3.scaleLinear().domain([0, maxColTotal]).nice().range([plotBottom, plotTop]);

  // Y軸（公布数）グリッド＋目盛
  for (const tv of y.ticks(5)) {
    svg.append("line").attr("class", "gridsep").attr("x1", leftAxis).attr("x2", w).attr("y1", y(tv)).attr("y2", y(tv)).style("opacity", tv === 0 ? 1 : 0.5);
    svg.append("text").attr("class", "pyr-total").attr("x", leftAxis - 6).attr("y", y(tv) + 3).attr("text-anchor", "end").text(tv.toLocaleString());
  }
  svg.append("text").attr("class", "pyr-total").attr("x", leftAxis - 6).attr("y", plotTop - 6).attr("text-anchor", "end").text("公布数");

  // 元号バンド（境目＋表示先頭に区切り線＋元号名）
  periods.forEach((p, i) => {
    if (!p.eraStart && i !== 0) return;
    const x = xOf(i);
    svg.append("line").attr("class", "gridsep").attr("x1", x).attr("x2", x).attr("y1", plotTop - 2).attr("y2", plotBottom + 4);
    svg.append("text").attr("class", "pyr-era").attr("x", x + 3).attr("y", plotTop + 10).style("font-size", "11px").text(p.era);
  });

  // 期間ラベル（開始年）を下軸に回転表示
  const labStep = colW < 22 ? 2 : 1;
  periods.forEach((p, i) => {
    if (!(labStep === 1 || p.eraStart || i % labStep === 0)) return;
    svg.append("text").attr("class", "yearlab" + (p.eraStart ? " major" : ""))
      .attr("transform", `translate(${xOf(i) + colW / 2 + 4},${plotBottom + 10}) rotate(-55)`)
      .attr("text-anchor", "start").text(p.start);
  });

  // 列ごとに下→上へ積み上げ（希少→多数）
  periods.forEach((p, i) => {
    const o = counts[idxOf(p)];
    let cum = 0;
    for (const t of stackOrder) {
      const n = o[t] || 0; if (!n) continue;
      const yTop = y(cum + n), yBot = y(cum);
      svg.append("rect").attr("class", "pyr-seg")
        .attr("x", xOf(i)).attr("y", yTop).attr("width", Math.max(0.6, colW))
        .attr("height", Math.max(0.6, yBot - yTop)).attr("fill", typeColor[t] || "#9aa7b1")
        .on("mousemove", (ev) => showTip(ev,
          `<b>${p.start}〜${p.end}年（${p.era}）</b> ／ ${t}<br>この期間に公布 <b>${n.toLocaleString()}</b> 件`))
        .on("mouseleave", hideTip)
        .on("click", () => selectDist(p, t));
      cum += n;
    }
  });
}

function renderDistLegend(typeTotals, grand) {
  const box = el("legend");
  let html = `<span class="title">凡例</span><span style="color:var(--muted);font-size:12px">現行法令を公布年（5年区切り）で度数分布／下＝希少な種別・上＝多数／棒をクリックで一覧</span>`;
  // 積み上げ（下＝希少→上＝多数）に合わせ、凡例は多数→希少で上から読める順に
  for (const g of state.data.axes.law_type.groups) {
    const n = typeTotals[g.label] || 0; if (!n) continue;
    html += `<span class="item lt"><span class="sw" style="background:${typeColor[g.label]}"></span>${g.label} ${n.toLocaleString()}</span>`;
  }
  html += `<span class="item" style="font-weight:600">計 ${grand.toLocaleString()}件</span>`;
  box.innerHTML = html;
}

function selectDist(period, typeLabel) {
  state.selected = null;
  const inP = (l) => {
    const y = l.date ? parseInt(String(l.date).slice(0, 4), 10) : null;
    return Number.isFinite(y) && y >= period.start && y <= period.end;
  };
  const list = state.data.laws
    .filter((l) => (l.groups.law_type || "不明") === typeLabel && inP(l))
    .sort((a, b) => String(a.date).localeCompare(String(b.date)));
  el("panel").classList.add("open");
  el("panelTitle").textContent = `${period.start}〜${period.end}年（${period.era}）／ ${typeLabel}`;
  el("panelSub").textContent = `この期間に公布され現存 ${list.length.toLocaleString()} 件（公布が古い順）`;
  const LIMIT = 100;
  // 先頭に要約
  let html = "";
  if (list.length) {
    const mostAmended = list.reduce((a, b) => ((b.total || 0) > (a.total || 0) ? b : a));
    html += `<div class="summary"><span class="st">この期間の特徴</span>`;
    html += `${period.start}〜${period.end}年に公布され今も有効な${typeLabel}は <b>${list.length.toLocaleString()}</b> 件。`;
    html += ` 最古は <b>${escapeHtml(list[0].title)}</b>（${String(list[0].date).slice(0, 4)}）、最も改正されたのは <b>${escapeHtml(mostAmended.title)}</b>（${(mostAmended.total || 0).toLocaleString()}回）。`;
    html += `</div>`;
  }
  html += `<section><h3>この期間に公布され今も有効な${typeLabel}</h3>`;
  html += list.slice(0, LIMIT).map((l) =>
    `<div class="law"><div class="cnt" style="min-width:46px">${String(l.date || "").slice(0, 4)}</div>
     <div class="nm"><a href="${EGOV_LAW_URL(l.id)}" target="_blank" rel="noopener">${escapeHtml(l.title)}</a>
     ${plainSub(l.id)}<div class="meta">${escapeHtml(l.num || l.id)} ／ 改正${(l.total || 0).toLocaleString()}回</div></div></div>`).join("");
  if (list.length > LIMIT) html += `<div class="more">ほか ${(list.length - LIMIT).toLocaleString()} 件</div>`;
  html += `</section>`;
  el("panelBody").innerHTML = html;
}

/* ---------- ツールチップ ---------- */
function showTip(ev, html) {
  tip.innerHTML = html;
  tip.style.opacity = 1;
  tip.style.left = Math.min(ev.clientX + 14, window.innerWidth - 290) + "px";
  tip.style.top = ev.clientY + 14 + "px";
}
function hideTip() { tip.style.opacity = 0; }

/* ---------- 右パネル ---------- */
function closePanel() { state.selected = null; el("panel").classList.remove("open"); render(); }

// 古い法令名の平易化（③）。あれば名称の下に併記。
const plainSub = (id) => (state.plainnames && state.plainnames[id] ? `<div class="plain">${escapeHtml(state.plainnames[id].plain)}</div>` : "");

function lawRow(law, count) {
  const date = law.date ? `<span class="meta">公布 ${law.date}</span>` : "";
  return `<div class="law"><div class="cnt">${count}</div>
    <div class="nm"><a href="${EGOV_LAW_URL(law.id)}" target="_blank" rel="noopener">${escapeHtml(law.title)}</a>
    ${plainSub(law.id)}<div class="meta">${escapeHtml(law.num || law.id)} ${date}</div></div></div>`;
}
function escapeHtml(s) { return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

function selectCell(cellData, period) {
  state.selected = { group: cellData.group, period: period ? period.start : null };
  const cell = groupsOf().find((c) => c.group === cellData.group);
  const groupLaws = lawsInGroup(cell.group);
  el("panel").classList.add("open");
  const scopeTxt = period ? `／ ${period.start}〜${period.end}年（${period.era}）` : `／ 累計 ${rangeLabel()}`;
  el("panelTitle").textContent = cell.label;
  el("panelSub").textContent = `法令 ${cell.law_count.toLocaleString()} 件 ${scopeTxt}`;

  // 改正内訳ランキング (期間指定ならその5年間、なければ表示範囲の累計)
  const valOf = (law) => (period ? periodVal(law.by_year, period) : sumInRange(law.by_year));
  const ranked = groupLaws.map((law) => ({ law, count: valOf(law) })).sort((a, b) => b.count - a.count);
  const amended = ranked.filter((r) => r.count > 0);
  const LIMIT = 50;

  // AI参考解説（事前生成・任意）。期間指定セルかつ該当キーがあるときのみ表示。
  let html = "";
  if (period && state.insights) {
    const ins = state.insights[`${state.axis}|${cell.group}|${period.start}`];
    if (ins && ins.caption) {
      const tag = state.insightsMeta && state.insightsMeta.sample ? "AI参考解説（サンプル）" : "AI参考解説";
      const note = (state.insightsMeta && state.insightsMeta.disclaimer) || "AIが実データを基に生成した参考情報です。";
      html += `<div class="insight"><span class="it">💡 ${tag}</span>${escapeHtml(ins.caption)}<div class="note">${escapeHtml(note)}</div></div>`;
    }
  }

  // 要約（クリックの見返りを先に提示）
  const scopeTotal = amended.reduce((s, r) => s + r.count, 0);
  const scopeWord = period ? "この期間" : "表示範囲";
  html += `<div class="summary"><span class="st">この区分の特徴</span>`;
  html += `法令 <b>${cell.law_count.toLocaleString()}</b> 件、${scopeWord}の改正計 <b>${scopeTotal.toLocaleString()}</b> 回。`;
  if (amended[0]) html += ` 最も改正されたのは <b>${escapeHtml(amended[0].law.title)}</b>（${amended[0].count.toLocaleString()}回）。`;
  else html += ` ${scopeWord}に改正された法令はありません。`;
  html += `</div>`;

  html += `<section><h3>② 改正内訳（回数ランキング）</h3>`;
  if (amended.length === 0) {
    html += `<div class="more">この${period ? "期間" : "範囲"}に改正された法令はありません。</div>`;
  } else {
    html += amended.slice(0, LIMIT).map((r) => lawRow(r.law, r.count)).join("");
    if (amended.length > LIMIT) html += `<div class="more">ほか ${amended.length - LIMIT} 件</div>`;
  }
  html += `</section>`;

  // 法令一覧 (期間指定時=その期間に改正された法令 / 累計時=区分の全法令)
  const listLaws = period ? amended.map((r) => r.law) : groupLaws;
  html += `<section><h3>① 法令一覧（${period ? `${period.start}〜${period.end}年に改正` : "この区分の全法令"}・${listLaws.length.toLocaleString()}件）</h3>`;
  html += listLaws.slice(0, LIMIT).map((law) => lawRow(law, valOf(law))).join("");
  if (listLaws.length > LIMIT) html += `<div class="more">ほか ${listLaws.length - LIMIT} 件（全件はe-Gov法令検索で）</div>`;
  html += `</section>`;

  el("panelBody").innerHTML = html;
  render(); // ハイライト更新
}

// ウィンドウのリサイズに追従 (連続発火を間引き)
let _rz;
window.addEventListener("resize", () => {
  clearTimeout(_rz);
  _rz = setTimeout(() => { if (state.data) render(); }, 120);
});

load();

// PWA: サービスワーカー登録（オフライン対応・インストール可能化）
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((err) => console.warn("SW登録失敗:", err));
  });
}
</script>
