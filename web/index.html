<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>e-Gov 改正頻度ヒートマップ — 法令種別</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  :root {
    --ink: #32414b;          /* base text (finoject Deep Slate Gray) */
    --accent: #2e5090;       /* finoject YInMn Blue */
    --line: #d9dee3;
    --panel: #f6f8fa;
    --muted: #6b7884;
    --zero: #eceff1;         /* 改正0回 = 無彩色 */
    --bg: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, sans-serif;
    color: var(--ink); background: var(--bg); font-size: 14px;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    border-bottom: 1px solid var(--line); padding: 10px 16px;
    display: flex; flex-wrap: wrap; gap: 14px 20px; align-items: center;
  }
  header h1 { font-size: 15px; font-weight: 600; margin: 0; letter-spacing: .02em; }
  header h1 .sub { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 8px; }
  .ctl { display: flex; align-items: center; gap: 6px; }
  .ctl label { color: var(--muted); font-size: 12px; }
  select, input[type=search] {
    font: inherit; font-size: 13px; color: var(--ink);
    border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; background: #fff;
  }
  input[type=search] { width: 200px; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .seg button {
    font: inherit; font-size: 13px; border: 0; background: #fff; color: var(--ink);
    padding: 5px 12px; cursor: pointer;
  }
  .seg button.active { background: var(--accent); color: #fff; }
  .seg button + button { border-left: 1px solid var(--line); }

  main { flex: 1; display: flex; min-height: 0; }
  #stage { flex: 1; overflow: hidden; padding: 16px; position: relative; min-width: 0; }
  #chart { display: block; }
  #legend { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin: 4px 0 14px; }
  #legend .item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  #legend .sw { width: 18px; height: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,.08); }
  #legend .title { color: var(--ink); font-weight: 600; }

  aside {
    width: 360px; border-left: 1px solid var(--line); background: var(--panel);
    overflow: auto; padding: 0; display: none; flex-direction: column;
  }
  aside.open { display: flex; }
  aside .head { padding: 12px 16px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--panel); }
  aside .head .t { font-weight: 600; font-size: 14px; }
  aside .head .s { color: var(--muted); font-size: 12px; margin-top: 2px; }
  aside .close { float: right; cursor: pointer; color: var(--muted); border: 0; background: none; font-size: 18px; line-height: 1; }
  aside section { padding: 10px 16px 16px; }
  aside h3 { font-size: 12px; text-transform: none; color: var(--accent); margin: 6px 0 8px; letter-spacing: .03em; }
  .law { padding: 7px 0; border-bottom: 1px solid #e7ebef; display: flex; gap: 8px; align-items: baseline; }
  .law:last-child { border-bottom: 0; }
  .law .cnt { flex: 0 0 auto; min-width: 30px; text-align: right; font-variant-numeric: tabular-nums;
    color: var(--accent); font-weight: 600; }
  .law .nm { flex: 1; line-height: 1.35; }
  .law .nm a { color: var(--ink); text-decoration: none; }
  .law .nm a:hover { text-decoration: underline; color: var(--accent); }
  .law .meta { color: var(--muted); font-size: 11px; }
  .more { color: var(--muted); font-size: 12px; padding-top: 8px; }

  text.rowlab { font-size: 12px; fill: var(--ink); }
  text.yearlab { font-size: 10px; fill: var(--muted); }
  text.yearlab.major { fill: var(--ink); font-weight: 600; }
  text.rowlab.cur { fill: var(--accent); font-weight: 700; }
  line.gridsep { stroke: var(--line); stroke-width: 1px; shape-rendering: crispEdges; }
  rect.cell { stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
  rect.cell.dim { opacity: .15; }
  rect.cell.hit { stroke: var(--accent); stroke-width: 2.5px; }
  rect.cell.sel { stroke: var(--ink); stroke-width: 3px; }
  .tile text { pointer-events: none; }
  .tile rect { cursor: pointer; stroke: #fff; stroke-width: 1.5px; }
  .tile.dim { opacity: .18; }
  .tile.hit rect { stroke: var(--accent); stroke-width: 2.5px; }
  .tile.sel rect { stroke: var(--ink); stroke-width: 3px; }
  line.pyr-mid { stroke: var(--line); stroke-width: 1px; shape-rendering: crispEdges; }
  rect.pyr-seg { stroke: #fff; stroke-width: .5px; cursor: pointer; }
  rect.pyr-seg:hover { opacity: .82; }
  text.pyr-lab { fill: var(--ink); }
  text.pyr-era { fill: var(--accent); font-weight: 700; }
  text.pyr-total { font-size: 10px; fill: var(--muted); }
  #legend .lt .sw { width: 12px; height: 12px; }

  #tooltip {
    position: fixed; pointer-events: none; background: #1f2933; color: #fff; padding: 7px 10px;
    border-radius: 6px; font-size: 12px; line-height: 1.5; opacity: 0; transition: opacity .08s; z-index: 50;
    max-width: 280px; box-shadow: 0 4px 14px rgba(0,0,0,.25);
  }
  #tooltip b { font-weight: 600; }

  #overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px; color: var(--muted); background: rgba(255,255,255,.85);
  }
  #overlay.hidden { display: none; }
  .spinner { width: 26px; height: 26px; border: 3px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { border-top: 1px solid var(--line); padding: 8px 16px; font-size: 11px; color: var(--muted); }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>e-Gov 改正頻度ヒートマップ<span class="sub" id="hsub">法令種別 × 改正頻度（公布ベース）</span></h1>
  <div class="ctl">
    <div class="seg" id="modeSeg">
      <button data-mode="grid" class="active">経年グリッド</button>
      <button data-mode="treemap">累計ツリーマップ</button>
      <button data-mode="pyramid">法令ピラミッド</button>
    </div>
  </div>
  <div class="ctl">
    <label>分野軸</label>
    <select id="axisSel"><option value="law_type">法令種別</option></select>
  </div>
  <div class="ctl">
    <label>年</label>
    <select id="yearFrom"></select><span style="color:var(--muted)">–</span><select id="yearTo"></select>
  </div>
  <div class="ctl" style="margin-left:auto">
    <input type="search" id="search" placeholder="法令名で検索…" autocomplete="off" />
  </div>
</header>

<main>
  <div id="stage">
    <div id="legend"></div>
    <svg id="chart"></svg>
    <div id="overlay"><div class="spinner"></div><div id="ovmsg">データ読み込み中…</div></div>
  </div>
  <aside id="panel">
    <div class="head">
      <button class="close" id="panelClose" title="閉じる">×</button>
      <div class="t" id="panelTitle"></div>
      <div class="s" id="panelSub"></div>
    </div>
    <div id="panelBody"></div>
  </aside>
</main>

<footer>
  出典: <span id="srcText">e-Gov 法令API v2</span>（デジタル庁）を加工して作成。政府標準利用規約（第2.0版）に基づく。
  <span id="genInfo"></span> ／ 本ビューアは事前生成した集計JSONを表示します（実行時にAPIへはアクセスしません）。
</footer>

<div id="tooltip"></div>

<script>
const EGOV_LAW_URL = (id) => `https://laws.e-gov.go.jp/law/${id}`;
// 寒色→暖色のヒートマップ分位ランプ (少=青, 多=赤)。0回は別扱い(無彩色)。
// RdYlBu系を低→高で青→赤に。淡い黄白の中間は避け、寒暖の対比を明確にする。
const RAMP = ["#4575b4", "#74add1", "#abd9e9", "#fdae61", "#f46d43", "#d73027"];

const state = {
  data: null, axis: "law_type", mode: "grid", yearFrom: null, yearTo: null, search: "", selected: null,
};
const AXIS_LABELS = { law_type: "法令種別", category: "事項別分類", ministry: "所管府省" };
// 法令ピラミッド用: 法令種別ごとのカテゴリ色 (initControlsで法令種別グループ順に割当)
const TYPE_PALETTE = ["#2e5090", "#3a8fb7", "#5aa897", "#c9a24b", "#b0653f", "#7a3b8f", "#8c6aa8", "#b08968", "#9aa7b1"];
const typeColor = {};
const el = (id) => document.getElementById(id);
const tip = el("tooltip");

function showOverlay(msg, spin = true) {
  el("ovmsg").textContent = msg;
  el("overlay").querySelector(".spinner").style.display = spin ? "" : "none";
  el("overlay").classList.remove("hidden");
}
function hideOverlay() { el("overlay").classList.add("hidden"); }

async function load() {
  try {
    showOverlay("データ読み込み中…");
    const res = await fetch("../data/heatmap.json", { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.axes || Object.keys(data.axes).length === 0) {
      showOverlay("表示できるデータがありません（該当0件）。", false);
      return;
    }
    state.data = data;
    state.axis = data.default_axis && data.axes[data.default_axis] ? data.default_axis : Object.keys(data.axes)[0];
    initControls();
    hideOverlay();
    render();
  } catch (e) {
    showOverlay(`データの読み込みに失敗しました: ${e.message}`, false);
    console.error(e);
  }
}

function initControls() {
  const years = state.data.years;
  state.yearTo = years[years.length - 1];
  // 既定は直近12年（全期間は年レンジで選択可）。改正の近年動向が一目で読める粒度にする。
  state.yearFrom = Math.max(years[0], state.yearTo - 11);
  for (const sel of [el("yearFrom"), el("yearTo")]) {
    sel.innerHTML = years.map((y) => `<option value="${y}">${y}</option>`).join("");
  }
  el("yearFrom").value = state.yearFrom;
  el("yearTo").value = state.yearTo;
  el("genInfo").textContent = `生成日: ${state.data.generated_at}`;
  el("srcText").textContent = state.data.source || "e-Gov 法令API v2";

  // 分野軸セレクタ (data.axes から動的に。第2弾で category 追加、将来 ministry)
  el("axisSel").innerHTML = Object.keys(state.data.axes)
    .map((k) => `<option value="${k}">${state.data.axes[k].label || AXIS_LABELS[k] || k}</option>`).join("");
  el("axisSel").value = state.axis;
  // 法令種別の色割当 (グループ順=法令数の多い順)
  state.data.axes.law_type.groups.forEach((g, i) => { typeColor[g.label] = TYPE_PALETTE[i % TYPE_PALETTE.length]; });
  el("axisSel").addEventListener("change", (e) => {
    state.axis = e.target.value;
    state.selected = null; state.search = ""; el("search").value = "";
    closePanel(); render();
  });

  el("modeSeg").addEventListener("click", (e) => {
    const b = e.target.closest("button"); if (!b) return;
    state.mode = b.dataset.mode;
    [...el("modeSeg").children].forEach((c) => c.classList.toggle("active", c === b));
    state.selected = null; closePanel(); render();
  });
  const onYear = () => {
    let f = +el("yearFrom").value, t = +el("yearTo").value;
    if (f > t) { [f, t] = [t, f]; el("yearFrom").value = f; el("yearTo").value = t; }
    state.yearFrom = f; state.yearTo = t; render();
  };
  el("yearFrom").addEventListener("change", onYear);
  el("yearTo").addEventListener("change", onYear);
  el("search").addEventListener("input", (e) => {
    state.search = e.target.value.trim();
    if (state.search) state.selected = null; else el("panel").classList.remove("open");
    render();
  });
  el("panelClose").addEventListener("click", closePanel);
}

const yearsInRange = () => state.data.years.filter((y) => y >= state.yearFrom && y <= state.yearTo);
const sumInRange = (byYear) => yearsInRange().reduce((s, y) => s + (byYear[y] || byYear[String(y)] || 0), 0);
const cellYearVal = (cell, y) => cell.by_year[y] || cell.by_year[String(y)] || 0;

// 描画に使える領域 (ウィンドウ - パディング - 凡例)。グリッド/ツリーマップを縦横フィットさせる。
function chartArea() {
  const stage = el("stage");
  const cs = getComputedStyle(stage);
  const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
  const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
  const lg = el("legend");
  const lcs = getComputedStyle(lg);
  const legendH = (lg.offsetHeight || 0) + parseFloat(lcs.marginTop) + parseFloat(lcs.marginBottom);
  return {
    w: Math.max(320, stage.clientWidth - padX),
    h: Math.max(220, stage.clientHeight - padY - legendH - 6),
  };
}
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// 現在の軸の集計セル群
const groupsOf = () => state.data.axes[state.axis].groups;
// 指定区分に属する法令 (現在の軸で)
const lawsInGroup = (group) => state.data.laws.filter((l) => l.groups[state.axis] === group);

// 検索: タイトルに一致する法令と、それが属する現軸の区分集合を返す
function searchMatches() {
  const q = state.search.toLowerCase();
  if (!q) return null;
  const groups = new Set(); const laws = [];
  for (const law of state.data.laws) {
    if ((law.title || "").toLowerCase().includes(q)) {
      const g = law.groups[state.axis];
      if (g != null) groups.add(g);
      laws.push({ ...law, group: g, groupLabel: g });
    }
  }
  return { groups, laws };
}

// 現ビューの値から分位カラースケールを構築
function buildScale(values) {
  const nonzero = values.filter((v) => v > 0);
  if (nonzero.length === 0) return { color: () => "var(--zero)", quantile: null };
  const q = d3.scaleQuantile().domain(nonzero).range(RAMP);
  return { color: (v) => (v > 0 ? q(v) : "var(--zero)"), quantile: q };
}

function renderLegend(scale) {
  const box = el("legend");
  const metric = state.mode === "grid" ? "その年の改正回数" : "期間内の改正回数（累計）";
  let html = `<span class="title">凡例</span><span style="color:var(--muted);font-size:12px">${metric}</span>`;
  html += `<span class="item"><span class="sw" style="background:var(--zero)"></span>0回</span>`;
  if (scale.quantile) {
    const ext = scale.quantile.quantiles(); // 境界値 (RAMP.length-1 個)
    RAMP.forEach((col, i) => {
      const lo = i === 0 ? 1 : Math.floor(ext[i - 1]) + 1; // 整数で連続させ重複を防ぐ
      const hi = i === RAMP.length - 1 ? null : Math.floor(ext[i]);
      const lbl = hi == null ? `${lo}〜` : (lo >= hi ? `${lo}` : `${lo}〜${hi}`);
      html += `<span class="item"><span class="sw" style="background:${col}"></span>${lbl}</span>`;
    });
  } else {
    html += `<span class="item" style="color:var(--muted)">この範囲に改正データがありません</span>`;
  }
  box.innerHTML = html;
}

function render() {
  if (!state.data) return;
  const svg = d3.select("#chart");
  svg.selectAll("*").remove();
  const pyr = state.mode === "pyramid";
  // ピラミッドは公布年代×種別の集計のため、軸/年レンジは対象外（無効化して誤解を防ぐ）
  el("axisSel").disabled = pyr;
  el("yearFrom").disabled = pyr;
  el("yearTo").disabled = pyr;
  if (state.mode === "grid") renderGrid(svg);
  else if (state.mode === "treemap") renderTreemap(svg);
  else renderPyramid(svg);
  if (state.search && !state.selected && !pyr) showSearchResults();
}

// 検索: 一致法令を右パネルに直接表示
function showSearchResults() {
  const m = searchMatches();
  if (!m) return;
  el("panel").classList.add("open");
  el("panelTitle").textContent = `検索: 「${state.search}」`;
  el("panelSub").textContent = `${m.laws.length.toLocaleString()} 件ヒット（${m.groups.size} 区分）`;
  const LIMIT = 80;
  const sorted = m.laws.slice().sort((a, b) => b.total - a.total);
  let html = `<section><h3>該当する法令</h3>`;
  if (sorted.length === 0) html += `<div class="more">一致する法令がありません。</div>`;
  else {
    html += sorted.slice(0, LIMIT).map((law) =>
      `<div class="law"><div class="cnt">${law.total}</div>
       <div class="nm"><a href="${EGOV_LAW_URL(law.id)}" target="_blank" rel="noopener">${escapeHtml(law.title)}</a>
       <div class="meta">${escapeHtml(law.groupLabel || "")} ／ ${escapeHtml(law.num || law.id)}</div></div></div>`).join("");
    if (sorted.length > LIMIT) html += `<div class="more">ほか ${sorted.length - LIMIT} 件</div>`;
  }
  html += `</section>`;
  el("panelBody").innerHTML = html;
}

/* ---------- 経年グリッド ---------- */
function renderGrid(svg) {
  const cells = groupsOf();
  const years = yearsInRange();
  const match = searchMatches();

  // スケール: 全セル×全年(範囲内)の値
  const vals = [];
  cells.forEach((c) => years.forEach((y) => vals.push(cellYearVal(c, y))));
  const scale = buildScale(vals);
  renderLegend(scale);

  // ウィンドウ縦横にフィット (凡例ぶんを除いた領域をグリッドで埋める)
  const padTop = 22;
  const area = chartArea();
  const labelW = clamp(area.w * 0.16, 70, 120);
  const cellW = (area.w - labelW) / years.length;
  const rowH = (area.h - padTop) / cells.length;
  const w = area.w, h = area.h;
  const labFont = clamp(rowH * 0.5, 9, 13);
  const gap = rowH > 20 ? 2 : rowH > 12 ? 1 : 0; // セル間の白縁 (詰まったら無くす)
  svg.attr("width", w).attr("height", h);

  // 5年区切りの縦ガイド線（西暦末尾0/5の左端）
  svg.selectAll("line.gridsep").data(years.filter((y) => y % 5 === 0)).enter().append("line")
    .attr("class", "gridsep")
    .attr("x1", (y) => labelW + years.indexOf(y) * cellW).attr("x2", (y) => labelW + years.indexOf(y) * cellW)
    .attr("y1", padTop - 4).attr("y2", padTop + cells.length * rowH);

  // 年ラベル (列が狭いときは末尾0/5のみ表示し、節目を強調)
  const step = cellW < 26 ? 5 : 1;
  svg.selectAll("text.yearlab").data(years).enter().append("text")
    .attr("class", (d) => "yearlab" + (d % 5 === 0 ? " major" : ""))
    .attr("x", (d, i) => labelW + i * cellW + cellW / 2)
    .attr("y", padTop - 8).attr("text-anchor", "middle")
    .text((d) => (step === 1 || d % 5 === 0 ? d : ""));

  const rows = svg.selectAll("g.row").data(cells).enter().append("g")
    .attr("class", "row")
    .attr("transform", (d, i) => `translate(0,${padTop + i * rowH})`);

  rows.append("text").attr("class", "rowlab")
    .attr("data-group", (d) => d.group)
    .attr("x", labelW - 8).attr("y", rowH / 2 + labFont / 2 - 1).attr("text-anchor", "end")
    .style("font-size", labFont + "px")
    .text((d) => d.label);

  const isSel = (c, y) => state.selected && state.selected.group === c.group && state.selected.year === y;
  rows.each(function (c) {
    const g = d3.select(this);
    const dimRow = match && !match.groups.has(c.group);
    g.selectAll("rect").data(years).enter().append("rect")
      .attr("class", (y) => "cell" + (dimRow ? " dim" : "")
        + (match && match.groups.has(c.group) ? " hit" : "") + (isSel(c, y) ? " sel" : ""))
      .attr("x", (y, i) => labelW + i * cellW).attr("y", gap)
      .attr("width", cellW).attr("height", Math.max(1, rowH - gap * 2))
      .style("stroke-width", gap ? "1.5px" : "0.5px")
      .attr("fill", (y) => scale.color(cellYearVal(c, y)))
      .on("mousemove", (ev, y) => {
        svg.selectAll("text.rowlab").classed("cur", (d) => d.group === c.group);
        svg.selectAll("text.yearlab").classed("major", (d) => d === y || d % 5 === 0);
        showTip(ev, `<b>${c.label}</b> ／ ${y}年<br>改正 <b>${cellYearVal(c, y)}</b> 回<br>法令数 ${c.law_count.toLocaleString()}`);
      })
      .on("mouseleave", () => {
        svg.selectAll("text.rowlab").classed("cur", false);
        svg.selectAll("text.yearlab").classed("major", (d) => d % 5 === 0);
        hideTip();
      })
      .on("click", (ev, y) => selectCell(c, y));
  });
}

/* ---------- 累計ツリーマップ ---------- */
function renderTreemap(svg) {
  const cells = groupsOf();
  const match = searchMatches();
  const totals = cells.map((c) => sumInRange(c.by_year));
  const scale = buildScale(totals);
  renderLegend(scale);

  const area = chartArea();
  const w = area.w, h = area.h;
  svg.attr("width", w).attr("height", h);

  const root = d3.hierarchy({ children: cells })
    .sum((d) => d.law_count || 0)
    .sort((a, b) => b.value - a.value);
  d3.treemap().size([w, h]).paddingInner(2).round(true)(root);

  const t = svg.selectAll("g.tile").data(root.leaves()).enter().append("g")
    .attr("class", (d) => {
      const m = match && match.groups.has(d.data.group);
      const dim = match && !m;
      const sel = state.selected && state.selected.group === d.data.group && state.selected.year == null;
      return "tile" + (dim ? " dim" : "") + (m ? " hit" : "") + (sel ? " sel" : "");
    })
    .attr("transform", (d) => `translate(${d.x0},${d.y0})`);

  t.append("rect")
    .attr("width", (d) => d.x1 - d.x0).attr("height", (d) => d.y1 - d.y0)
    .attr("fill", (d) => scale.color(sumInRange(d.data.by_year)))
    .on("mousemove", (ev, d) => showTip(ev,
      `<b>${d.data.label}</b><br>法令数 <b>${d.data.law_count.toLocaleString()}</b><br>改正 <b>${sumInRange(d.data.by_year)}</b> 回（${state.yearFrom}–${state.yearTo}）`))
    .on("mouseleave", hideTip)
    .on("click", (ev, d) => selectCell(d.data, null));

  t.append("text").attr("x", 6).attr("y", 16)
    .style("font-size", "12px").style("font-weight", "600")
    .style("fill", (d) => (sumInRange(d.data.by_year) > (scale.quantile ? (scale.quantile.quantiles()[3] ?? 1e9) : 1e9) ? "#fff" : "var(--ink)"))
    .each(function (d) {
      const wpx = d.x1 - d.x0, hpx = d.y1 - d.y0;
      const sel = d3.select(this);
      if (wpx < 46 || hpx < 26) { sel.remove(); return; }
      sel.append("tspan").text(d.data.label);
      if (hpx > 40)
        sel.append("tspan").attr("x", 6).attr("dy", 15).style("font-weight", "400")
          .style("fill", "currentColor").style("opacity", .85)
          .text(`${d.data.law_count.toLocaleString()}件`);
      if (hpx > 58)
        sel.append("tspan").attr("x", 6).attr("dy", 14).style("font-weight", "400")
          .style("fill", "currentColor").style("opacity", .7)
          .text(`改正${sumInRange(d.data.by_year).toLocaleString()}回`);
    });
}

/* ---------- 法令ピラミッド（現行法令の公布年代分布） ---------- */
const decadeOf = (dateStr) => {
  if (!dateStr) return null;
  const y = parseInt(String(dateStr).slice(0, 4), 10);
  return Number.isFinite(y) ? Math.floor(y / 10) * 10 : null;
};
const eraOf = (dec) => (dec >= 2020 ? "令和" : dec >= 1990 ? "平成" : dec >= 1930 ? "昭和" : dec >= 1910 ? "大正" : "明治");

function renderPyramid(svg) {
  const laws = state.data.laws;
  const typeOrder = state.data.axes.law_type.groups.map((g) => g.label); // 法令数の多い順

  // 公布年代 × 法令種別で現行法令を集計
  const decMap = new Map();
  let minDec = Infinity, maxDec = -Infinity;
  for (const l of laws) {
    const dec = decadeOf(l.date);
    if (dec == null) continue;
    minDec = Math.min(minDec, dec); maxDec = Math.max(maxDec, dec);
    if (!decMap.has(dec)) decMap.set(dec, {});
    const o = decMap.get(dec);
    const t = l.groups.law_type || "不明";
    o[t] = (o[t] || 0) + 1;
  }
  if (!isFinite(minDec)) { renderPyramidLegend({}, 0); return; }
  const decades = [];
  for (let d = minDec; d <= maxDec; d += 10) decades.push(d);
  const totals = decades.map((d) => typeOrder.reduce((s, t) => s + ((decMap.get(d) || {})[t] || 0), 0));
  const maxTotal = Math.max(1, ...totals);

  // 凡例用の種別別累計＋総数（バーと一致させる）
  const typeTotals = {}; let grand = 0;
  for (const d of decades) { const o = decMap.get(d) || {}; for (const t of typeOrder) if (o[t]) { typeTotals[t] = (typeTotals[t] || 0) + o[t]; grand += o[t]; } }
  renderPyramidLegend(typeTotals, grand);

  const area = chartArea();
  const w = area.w, h = area.h, topM = 6, leftM = 92, rightM = 56;
  svg.attr("width", w).attr("height", h);
  const plotW = w - leftM - rightM;
  const midX = leftM + plotW / 2;
  const rowH = (h - topM) / decades.length;
  const barH = Math.max(2, rowH * 0.78);
  const scale = plotW / maxTotal; // 件数→px
  const labFont = clamp(rowH * 0.46, 9, 12);

  // 中央線
  svg.append("line").attr("class", "pyr-mid")
    .attr("x1", midX).attr("x2", midX).attr("y1", topM).attr("y2", topM + decades.length * rowH);

  decades.forEach((dec, i) => {
    const yTop = topM + i * rowH;
    const o = decMap.get(dec) || {};
    const total = totals[i];

    // 年代ラベル（元号が変わる最初の年代に元号を付す）
    const showEra = i === 0 || eraOf(dec) !== eraOf(decades[i - 1]);
    svg.append("text").attr("class", "pyr-lab" + (showEra ? " pyr-era" : ""))
      .attr("x", leftM - 8).attr("y", yTop + rowH / 2 + labFont / 2 - 1)
      .attr("text-anchor", "end").style("font-size", labFont + "px")
      .text(showEra ? `${eraOf(dec)}・${dec}年代` : `${dec}年代`);

    // 中央そろえの積み上げバー（人口ピラミッド風の対称シルエット）
    let x = midX - (total * scale) / 2;
    for (const t of typeOrder) {
      const c = o[t] || 0; if (!c) continue;
      const segW = c * scale;
      svg.append("rect").attr("class", "pyr-seg")
        .attr("x", x).attr("y", yTop + (rowH - barH) / 2)
        .attr("width", Math.max(0.6, segW)).attr("height", barH)
        .attr("fill", typeColor[t] || "#9aa7b1")
        .on("mousemove", (ev) => showTip(ev,
          `<b>${eraOf(dec)}・${dec}年代</b> ／ ${t}<br>現存 <b>${c.toLocaleString()}</b> 件<br>年代計 ${total.toLocaleString()} 件`))
        .on("mouseleave", hideTip)
        .on("click", () => selectPyramid(dec, t));
      x += segW;
    }
    if (total) svg.append("text").attr("class", "pyr-total")
      .attr("x", midX + (total * scale) / 2 + 4).attr("y", yTop + rowH / 2 + 3)
      .text(total.toLocaleString());
  });
}

function renderPyramidLegend(typeTotals, grand) {
  const box = el("legend");
  let html = `<span class="title">凡例</span><span style="color:var(--muted);font-size:12px">現行法令を公布年代別に集計（上ほど古い）／数字は現存累計／バーをクリックで一覧</span>`;
  for (const g of state.data.axes.law_type.groups) {
    const n = typeTotals[g.label] || 0; if (!n) continue;
    html += `<span class="item lt"><span class="sw" style="background:${typeColor[g.label]}"></span>${g.label} ${n.toLocaleString()}</span>`;
  }
  html += `<span class="item" style="font-weight:600">計 ${grand.toLocaleString()}件</span>`;
  box.innerHTML = html;
}

function selectPyramid(dec, typeLabel) {
  state.selected = null;
  const list = state.data.laws
    .filter((l) => (l.groups.law_type || "不明") === typeLabel && decadeOf(l.date) === dec)
    .sort((a, b) => String(a.date).localeCompare(String(b.date)));
  el("panel").classList.add("open");
  el("panelTitle").textContent = `${eraOf(dec)}・${dec}年代 ／ ${typeLabel}`;
  el("panelSub").textContent = `現存 ${list.length.toLocaleString()} 件（公布年が古い順）`;
  const LIMIT = 100;
  let html = `<section><h3>この年代に公布され今も有効な${typeLabel}</h3>`;
  html += list.slice(0, LIMIT).map((l) =>
    `<div class="law"><div class="cnt" style="min-width:46px">${String(l.date || "").slice(0, 4)}</div>
     <div class="nm"><a href="${EGOV_LAW_URL(l.id)}" target="_blank" rel="noopener">${escapeHtml(l.title)}</a>
     <div class="meta">${escapeHtml(l.num || l.id)} ／ 改正${(l.total || 0).toLocaleString()}回</div></div></div>`).join("");
  if (list.length > LIMIT) html += `<div class="more">ほか ${(list.length - LIMIT).toLocaleString()} 件</div>`;
  html += `</section>`;
  el("panelBody").innerHTML = html;
}

/* ---------- ツールチップ ---------- */
function showTip(ev, html) {
  tip.innerHTML = html;
  tip.style.opacity = 1;
  tip.style.left = Math.min(ev.clientX + 14, window.innerWidth - 290) + "px";
  tip.style.top = ev.clientY + 14 + "px";
}
function hideTip() { tip.style.opacity = 0; }

/* ---------- 右パネル ---------- */
function closePanel() { state.selected = null; el("panel").classList.remove("open"); render(); }

function lawRow(law, count) {
  const date = law.date ? `<span class="meta">公布 ${law.date}</span>` : "";
  return `<div class="law"><div class="cnt">${count}</div>
    <div class="nm"><a href="${EGOV_LAW_URL(law.id)}" target="_blank" rel="noopener">${escapeHtml(law.title)}</a>
    <div class="meta">${escapeHtml(law.num || law.id)} ${date}</div></div></div>`;
}
function escapeHtml(s) { return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

function selectCell(cellData, year) {
  state.selected = { group: cellData.group, year };
  const cell = groupsOf().find((c) => c.group === cellData.group);
  const groupLaws = lawsInGroup(cell.group);
  el("panel").classList.add("open");
  const yearTxt = year != null ? `／ ${year}年` : `／ 累計 ${state.yearFrom}–${state.yearTo}`;
  el("panelTitle").textContent = cell.label;
  el("panelSub").textContent = `法令 ${cell.law_count.toLocaleString()} 件 ${yearTxt}`;

  // 改正内訳ランキング (year指定ならその年、なければ範囲累計)
  const ranked = groupLaws
    .map((law) => ({ law, count: year != null ? (law.by_year[year] || law.by_year[String(year)] || 0) : sumInRange(law.by_year) }))
    .sort((a, b) => b.count - a.count);
  const amended = ranked.filter((r) => r.count > 0);
  const LIMIT = 50;

  let html = `<section><h3>② 改正内訳（回数ランキング）</h3>`;
  if (amended.length === 0) {
    html += `<div class="more">この${year != null ? "年" : "期間"}に改正された法令はありません。</div>`;
  } else {
    html += amended.slice(0, LIMIT).map((r) => lawRow(r.law, r.count)).join("");
    if (amended.length > LIMIT) html += `<div class="more">ほか ${amended.length - LIMIT} 件</div>`;
  }
  html += `</section>`;

  // 法令一覧 (年指定時=その年に改正された法令 / 累計時=区分の全法令)
  const listLaws = year != null ? amended.map((r) => r.law) : groupLaws;
  html += `<section><h3>① 法令一覧（${year != null ? `${year}年に改正` : "この区分の全法令"}・${listLaws.length.toLocaleString()}件）</h3>`;
  html += listLaws.slice(0, LIMIT).map((law) => lawRow(law, year != null ? (law.by_year[year] || law.by_year[String(year)] || 0) : law.total)).join("");
  if (listLaws.length > LIMIT) html += `<div class="more">ほか ${listLaws.length - LIMIT} 件（全件はe-Gov法令検索で）</div>`;
  html += `</section>`;

  el("panelBody").innerHTML = html;
  render(); // ハイライト更新
}

// ウィンドウのリサイズに追従 (連続発火を間引き)
let _rz;
window.addEventListener("resize", () => {
  clearTimeout(_rz);
  _rz = setTimeout(() => { if (state.data) render(); }, 120);
});

load();
</script>
